<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#7c63f5"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111e38"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Gradient border ring -->
  <rect width="100" height="100" rx="22" fill="url(#grad)" opacity="0.35"/>
  <!-- Dark background inset -->
  <rect x="2" y="2" width="96" height="96" rx="20.5" fill="url(#bg)"/>

  <!-- Subtle top-left accent dot -->
  <circle cx="18" cy="18" r="4" fill="url(#grad)" opacity="0.6"/>

  <!-- GV monogram -->
  <text
    x="50"
    y="50"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="50"
    font-weight="900"
    fill="url(#grad)"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-2"
    filter="url(#glow)">GV</text>

  <!-- Bottom accent line -->
  <rect x="28" y="83" width="44" height="3" rx="1.5" fill="url(#grad)" opacity="0.5"/>
</svg>
